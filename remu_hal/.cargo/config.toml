# RISC-V bare-metal: applies to riscv32i, riscv32im, riscv32imac, riscv64*, etc.
# build-app invokes cargo from remu_hal/ so this config is used.
[target.'cfg(all(any(target_arch = "riscv32", target_arch = "riscv64"), target_os = "none"))']
linker = "rust-lld"
rustflags = ["-C", "link-arg=-Tmemory.x", "-C", "link-arg=-Tlink.x"]
